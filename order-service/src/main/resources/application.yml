server:
  port: ${ORDER_SERVICE_PORT:8082}

grpc:
  storage:
    timeout-ms: 3000
    instance-cache-ttl-ms: 30000
    reconnect-delay-ms: 2000

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://postgres-order:5432/${ORDER_DB_NAME:order_db}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:user}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    drop-first: false

  rabbitmq:
    host: rabbitmq
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:${KEYCLOAK_PORT:8081}/realms/${KEYCLOAK_REALM:car-dealership}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-service:${DISCOVERY_SERVICE_PORT:8761}/eureka/

  instance:
    prefer-ip-address: true