syntax = "proto3";

package peipo.ru.storage.grpc;

option java_package = "peipo.ru.storage.grpc";
option java_outer_classname = "CarsProto";
option java_multiple_files = true;

enum FuelType {
  GASOLINE = 0;
  ELECTRIC = 1;
  DIESEL = 2;
}

enum DrivetrainType {
  FWD = 0;
  RWD = 1;
  FOURWD = 2;
  AWD = 3;
}

message EngineMessage {
  int32 volume = 1;
  int32 power = 2;
  FuelType fuel_type = 3;
}

message BodyMessage {
  string type = 1;
}

message GearBoxMessage {
  string type = 1;
}

message InteriorMessage {
  string name = 1;
}

message WheelsMessage {
  int32 size = 1;
}

message CarConfigurationMessage {
  string brand = 1;
  string model = 2;

  BodyMessage body = 3;
  EngineMessage engine = 4;
  GearBoxMessage gear_box = 5;
  InteriorMessage interior = 6;
  WheelsMessage wheels = 7;

  DrivetrainType drivetrain_type = 8;
  string color = 9;
}

message CarMessage {
  string id = 1;
  CarConfigurationMessage configuration = 2;
}

message CarFilterMessage {
  string brand = 1;
  string model = 2;
  string gear_box = 3;
  string color = 4;
  int32 min_horse_power = 5;
  int32 max_horse_power = 6;
}

message GetCarByIdRequest {
  string id = 1;
}

message GetCarByIdResponse {
  CarMessage car = 1;
}

message GetAllCarsRequest {
  CarFilterMessage filter = 1;
}

message GetAllCarsResponse {
  repeated CarMessage cars = 1;
}

service CarGrpcService {
  rpc GetCarById(GetCarByIdRequest) returns (GetCarByIdResponse);
  rpc GetAllCars(GetAllCarsRequest) returns (GetAllCarsResponse);
}